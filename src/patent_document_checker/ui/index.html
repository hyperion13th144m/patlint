<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PatLint</title>
  <link rel="icon" href="/ui/assets/favicon.ico" sizes="any">
  <link rel="icon" href="/ui/assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/ui/assets/favicon_16.png" sizes="16x16" type="image/png">
  <link rel="icon" href="/ui/assets/favicon_32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="/ui/assets/favicon_48.png" sizes="48x48" type="image/png">
  <link rel="icon" href="/ui/assets/favicon_128.png" sizes="128x128" type="image/png">
  <link rel="icon" href="/ui/assets/favicon_192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="/ui/assets/favicon_192.png">
  <style>
    :root {
      color-scheme: light;
      --border: #d1d5db;
      --muted: #6b7280;
      --panel: #f9fafb;
      --text: #111827;
      --accent: #1f6f5b;
      --error: #b91c1c;
      --warning: #a16207;
      --info: #1d4ed8;
      --ai: #6d28d9;
    }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--text); background: #fff; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    h1 { margin: 0; font-size: 20px; font-weight: 650; }
    nav { display: flex; align-items: center; gap: 14px; }
    nav a { color: var(--accent); font-size: 13px; font-weight: 650; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    main { display: grid; grid-template-columns: minmax(320px, 420px) 1fr; min-height: calc(100vh - 65px); }
    aside { border-right: 1px solid var(--border); padding: 20px; background: var(--panel); }
    section { padding: 20px 24px; overflow: auto; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 16px 0 6px; }
    textarea { width: 100%; min-height: 260px; resize: vertical; border: 1px solid var(--border); border-radius: 6px; padding: 10px; font: 14px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace; background: #fff; }
    input[type="file"] { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px; background: #fff; }
    input[type="text"] { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 13px; background: #fff; }
    select { width: 100%; min-height: 34px; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; background: #fff; font-size: 13px; }
    button { min-height: 36px; border: 1px solid var(--accent); border-radius: 6px; padding: 0 14px; color: #fff; background: var(--accent); font-weight: 600; cursor: pointer; }
    button.secondary { color: var(--text); border-color: var(--border); background: #fff; }
    button:disabled { opacity: .55; cursor: wait; }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
    .tabs button { color: var(--text); border-color: var(--border); background: #fff; }
    .tabs button.active { color: #fff; border-color: var(--accent); background: var(--accent); }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 16px; }
    .muted { color: var(--muted); font-size: 13px; }
    .hidden { display: none; }
    .summary { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .pill { border: 1px solid var(--border); border-radius: 999px; padding: 5px 10px; background: #fff; font-size: 13px; }
    .pill.error { color: var(--error); border-color: #fecaca; background: #fef2f2; }
    .pill.warning { color: var(--warning); border-color: #fde68a; background: #fffbeb; }
    .pill.info { color: var(--info); border-color: #bfdbfe; background: #eff6ff; }
    .pill.ai { color: var(--ai); border-color: #ddd6fe; background: #f5f3ff; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 13px; }
    th, td { border: 1px solid var(--border); padding: 8px; vertical-align: top; text-align: left; overflow-wrap: anywhere; }
    th { background: #f3f4f6; position: sticky; top: 0; }
    .empty { border: 1px dashed var(--border); border-radius: 8px; padding: 28px; color: var(--muted); background: var(--panel); }
    .diagnostics-table th:nth-child(1), .diagnostics-table td:nth-child(1) { width: 92px; }
    .diagnostics-table th:nth-child(2), .diagnostics-table td:nth-child(2) { width: 170px; }
    .diagnostic-meta { margin-top: 6px; color: var(--muted); font-size: 12px; }
    .severity-badge { display: inline-block; border-radius: 999px; padding: 2px 8px; font-size: 12px; font-weight: 700; }
    .severity-error .severity-badge { color: #991b1b; background: #fee2e2; }
    .severity-warning .severity-badge { color: #92400e; background: #fef3c7; }
    .severity-info .severity-badge { color: #1e40af; background: #dbeafe; }
    .ai-badge { display: inline-block; border-radius: 4px; padding: 1px 5px; font-size: 11px; font-weight: 700; color: var(--ai); background: #f5f3ff; border: 1px solid #ddd6fe; vertical-align: middle; margin-right: 4px; }
    .result-section { margin-top: 26px; }
    .result-section:first-child { margin-top: 0; }
    .result-section h2 { font-size: 18px; margin: 0 0 10px; }
    .reference-output { white-space: pre-wrap; word-break: break-word; border: 1px solid var(--border); border-radius: 6px; background: var(--panel); padding: 12px; line-height: 1.9; margin: 10px 0 12px; }
    .reference-controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; }
    .reference-controls label { margin: 0; }
    .reference-controls select { min-height: 34px; border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; background: #fff; width: auto; }
    .reference-controls .check { display: flex; align-items: center; gap: 6px; min-height: 34px; }
    .status { min-height: 20px; margin-top: 10px; }
    .error-text { color: var(--error); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .ai-panel { margin-top: 4px; }
    .ai-panel-title { font-size: 13px; font-weight: 700; color: var(--ai); margin: 0 0 4px; }
    .check-row { display: flex; align-items: center; gap: 6px; min-height: 34px; font-size: 13px; font-weight: 600; }
    .ai-status { min-height: 20px; margin-top: 8px; font-size: 13px; }
    #token-log { margin-top: 10px; font-size: 12px; color: var(--muted); }
    .token-entry { padding: 4px 0; border-top: 1px solid var(--border); }
    .token-entry:first-child { border-top: none; }
    .token-label { font-weight: 600; margin-bottom: 2px; }
    .grouped-table th:nth-child(1) { width: 120px; }
    .grouped-table td.location-cell { font-weight: 600; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; vertical-align: top; }
    .grouped-table td.issues-cell { vertical-align: top; }
    .issue-item { display: flex; gap: 6px; margin-bottom: 6px; align-items: flex-start; }
    .issue-item:last-child { margin-bottom: 0; }
    .issue-item[data-hidden] { display: none; }
    .issue-dot { flex-shrink: 0; margin-top: 3px; }
    .issue-dot.error { color: var(--error); }
    .issue-dot.warning { color: var(--warning); }
    .issue-dot.info { color: var(--info); }
    .issue-body { flex: 1; min-width: 0; }
    .issue-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 2px; }
    .issue-summary { display: flex; align-items: baseline; gap: 6px; cursor: pointer; user-select: none; }
    .issue-summary:hover .issue-message { text-decoration: underline; text-decoration-color: var(--border); }
    .issue-toggle { flex-shrink: 0; font-size: 11px; color: var(--muted); }
    .issue-message { font-size: 13px; }
    .issue-detail { margin-top: 6px; padding: 8px 10px; background: var(--panel); border-radius: 6px; border: 1px solid var(--border); font-size: 12px; line-height: 1.7; display: none; }
    .issue-detail.open { display: block; }
    .issue-detail-row { margin-bottom: 4px; }
    .issue-detail-row:last-child { margin-bottom: 0; }
    .issue-detail-key { font-weight: 700; color: var(--muted); margin-right: 4px; }
    .severity-filter { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
    .severity-filter span { font-size: 12px; color: var(--muted); margin-right: 2px; }
    .sev-btn { min-height: 26px; padding: 0 10px; font-size: 12px; font-weight: 700; border-radius: 999px; border: 1px solid var(--border); background: #fff; color: var(--muted); cursor: pointer; }
    .sev-btn.active-error { border-color: #fca5a5; background: #fee2e2; color: #991b1b; }
    .sev-btn.active-warning { border-color: #fcd34d; background: #fef3c7; color: #92400e; }
    .sev-btn.active-info { border-color: #93c5fd; background: #dbeafe; color: #1e40af; }
    .proofread-before { white-space: pre-wrap; word-break: break-word; background: #fef2f2; border-radius: 4px; padding: 6px 8px; font-size: 13px; line-height: 1.7; }
    .proofread-after { white-space: pre-wrap; word-break: break-word; background: #f0fdf4; border-radius: 4px; padding: 6px 8px; font-size: 13px; line-height: 1.7; }
    .diff-del { text-decoration: underline; text-decoration-color: #dc2626; text-decoration-thickness: 2px; color: #b91c1c; }
    .diff-ins { text-decoration: underline; text-decoration-color: #16a34a; text-decoration-thickness: 2px; color: #15803d; }
    .result-tabs { display: flex; flex-wrap: wrap; gap: 0; margin-bottom: 0; border-bottom: 2px solid var(--border); }
    .result-tab { min-height: 34px; padding: 0 14px; border: 1px solid var(--border); border-bottom: none; border-radius: 6px 6px 0 0; background: var(--panel); color: var(--muted); font-weight: 600; font-size: 13px; cursor: pointer; margin-right: 4px; margin-bottom: -2px; position: relative; }
    .result-tab.active { background: #fff; border-bottom: 2px solid #fff; color: var(--accent); }
    .result-tab:hover:not(.active) { background: #f3f4f6; color: var(--text); }
    .result-tab-badge { display: inline-block; background: var(--ai); color: #fff; border-radius: 999px; font-size: 11px; font-weight: 700; padding: 1px 6px; margin-left: 5px; vertical-align: middle; }
    .tab-panel { display: none; padding-top: 16px; }
    .tab-panel.active { display: block; }
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--border); }
    }
    @media print {
      aside { display: none; }
      .result-tabs { display: none; }
      .tab-panel { display: block !important; }
      .summary { margin-bottom: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>PatLint</h1>
    <nav aria-label="ヘッダナビゲーション">
      <a href="/help" target="_blank" rel="noopener">ヘルプ</a>
      <span class="muted" id="health">API</span>
    </nav>
  </header>
  <main>
    <aside>
      <div class="tabs">
        <button type="button" id="text-tab" class="active">テキスト</button>
        <button type="button" id="docx-tab">docx</button>
      </div>

      <form id="text-form">
        <label for="text-input">チェック対象テキスト</label>
        <textarea id="text-input" spellcheck="false" placeholder="【書類名】明細書&#10;【０００１】本文。&#10;【書類名】特許請求の範囲&#10;【請求項１】装置。"></textarea>
        <div class="actions">
          <button type="submit" id="text-submit">解析</button>
          <button type="button" class="secondary" id="clear-text">クリア</button>
        </div>
      </form>

      <form id="docx-form" class="hidden">
        <label for="docx-input">docx ファイル</label>
        <input id="docx-input" type="file" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
        <div class="actions">
          <button type="submit" id="docx-submit">アップロードして解析</button>
        </div>
      </form>

      <div class="status muted" id="status"></div>

      <!-- AI proofreading panel: shown after successful upload -->
      <div id="ai-panel" class="ai-panel hidden">
        <hr class="divider">
        <p class="ai-panel-title">AI文書校正</p>

        <label for="ai-provider">プロバイダー</label>
        <select id="ai-provider">
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="ollama">Ollama（ローカル）</option>
        </select>

        <div id="ollama-model-row" class="hidden">
          <label for="ai-ollama-model">Ollama モデル名</label>
          <input type="text" id="ai-ollama-model" placeholder="例: qwen3:8b" value="qwen3:8b">
        </div>

        <div class="check-row" style="margin-top: 14px;">
          <input type="checkbox" id="ai-anonymize" checked>
          <label for="ai-anonymize" style="margin: 0;">匿名化して送信</label>
        </div>

        <div class="actions">
          <button type="button" id="ai-submit">文書校正を実行</button>
          <button type="button" id="ai-cancel" class="secondary hidden">キャンセル</button>
          <button type="button" id="ai-clear" class="secondary hidden">クリア</button>
        </div>
        <div class="ai-status muted" id="ai-status"></div>
        <div id="token-log"></div>
      </div>
    </aside>

    <section>
      <div class="summary" id="summary"></div>
      <div id="result" class="empty">解析結果がここに表示されます。</div>
      <nav class="result-tabs hidden" id="result-tabs" aria-label="結果タブ">
        <button class="result-tab active" data-panel="panel-diagnostics">診断結果</button>
        <button class="result-tab" data-panel="panel-claims">請求項の関係</button>
        <button class="result-tab" data-panel="panel-reference">符号の説明</button>
        <button class="result-tab" data-panel="panel-terms">語句・単位</button>
        <button class="result-tab" id="ai-tab" data-panel="panel-ai">AI文書校正</button>
      </nav>
      <div id="panel-diagnostics" class="tab-panel active"></div>
      <div id="panel-claims" class="tab-panel"></div>
      <div id="panel-reference" class="tab-panel"></div>
      <div id="panel-terms" class="tab-panel"></div>
      <div id="panel-ai" class="tab-panel"></div>
    </section>
  </main>

  <script>
    const state = { result: null, documentId: null, proofreadResults: [], proofreadDone: false };
    const $ = selector => document.querySelector(selector);
    const status = $('#status');
    const summary = $('#summary');
    const result = $('#result');
    const aiPanel = $('#ai-panel');
    const aiStatus = $('#ai-status');
    const tokenLog = $('#token-log');

    // -----------------------------------------------------------------------
    // Mode switching
    // -----------------------------------------------------------------------

    const setMode = mode => {
      $('#text-tab').classList.toggle('active', mode === 'text');
      $('#docx-tab').classList.toggle('active', mode === 'docx');
      $('#text-form').classList.toggle('hidden', mode !== 'text');
      $('#docx-form').classList.toggle('hidden', mode !== 'docx');
      status.textContent = '';
    };

    const setBusy = busy => {
      document.querySelectorAll('aside button').forEach(button => button.disabled = busy);
      if (busy) status.textContent = '解析中...';
    };

    let _aiAbortController = null;

    const setAiBusy = busy => {
      $('#ai-submit').disabled = busy;
      $('#ai-cancel').classList.toggle('hidden', !busy);
    };

    $('#ai-cancel').addEventListener('click', () => {
      if (_aiAbortController) {
        _aiAbortController.abort();
        _aiAbortController = null;
      }
    });

    // -----------------------------------------------------------------------
    // Utility
    // -----------------------------------------------------------------------

    const escapeHtml = value => String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const showError = message => {
      status.innerHTML = `<span class="error-text">${escapeHtml(message)}</span>`;
    };

    const showAiError = message => {
      aiStatus.innerHTML = `<span class="error-text">${escapeHtml(message)}</span>`;
    };

    // -----------------------------------------------------------------------
    // Render
    // -----------------------------------------------------------------------

    const switchResultTab = panelId => {
      document.querySelectorAll('.result-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.panel === panelId);
      });
      document.querySelectorAll('.tab-panel').forEach(panel => {
        panel.classList.toggle('active', panel.id === panelId);
      });
    };

    document.querySelectorAll('.result-tab').forEach(btn => {
      btn.addEventListener('click', () => switchResultTab(btn.dataset.panel));
    });

    const render = data => {
      state.result = data;
      const counts = data.summary || { error: 0, warning: 0, info: 0 };
      summary.innerHTML = `
        <span class="pill error">Error ${counts.error ?? 0}</span>
        <span class="pill warning">Warning ${counts.warning ?? 0}</span>
        <span class="pill info">Info ${counts.info ?? 0}</span>
        <span class="pill">Source ${escapeHtml(data.source || '')}</span>
      `;
      // 空表示を消してタブを表示
      result.classList.add('hidden');
      $('#result-tabs').classList.remove('hidden');

      const allViews = data.diagnostic_views || [];
      const blocks = data.blocks || [];
      const ruleViews = allViews.filter(d => !d.rule_id.startsWith('AI_'));

      $('#panel-diagnostics').innerHTML = renderGroupedDiagnostics('診断結果（ルールベース）', ruleViews, blocks)
        || '<div class="empty">指摘事項はありません。</div>';
      $('#panel-claims').innerHTML = renderClaimRelationships(data.claims || [])
        || '<div class="empty">請求項データがありません。</div>';
      $('#panel-reference').innerHTML = renderReferenceSigns(data.reference_sign_entries || []);
      $('#panel-terms').innerHTML = [
        renderTermOccurrences(data.term_occurrences || {}),
        renderUnitChecks(data.unit_checks || [])
      ].join('');

      attachReferenceControls(data.reference_sign_entries || []);
      switchResultTab('panel-diagnostics');
      // AI校正セクションは render() に依存しない（逐次追記方式）
    };

    const section = (title, body) => `
      <div class="result-section">
        <h2>${escapeHtml(title)}</h2>
        ${body}
      </div>
    `;

    // -----------------------------------------------------------------------
    // Grouped diagnostics (by location block)
    // -----------------------------------------------------------------------

    // 【...】 ヘッダーを抽出する
    const extractHeader = text => {
      const m = String(text).match(/^(【[^】]*】)/);
      return m ? m[1] : null;
    };

    const SEVERITY_ORDER = { error: 0, warning: 1, info: 2 };
    const SEVERITY_DOT = { error: '●', warning: '▲', info: '◆' };

    const renderGroupedDiagnostics = (title, diagnostics, blocks) => {
      if (!diagnostics.length) return '';

      // blockIndex -> block オブジェクトのマップ
      const blockMap = new Map(blocks.map(b => [b.index, b]));

      // search_text から 【...】 を取り出して block を探す補助関数
      const findBlockBySearchText = searchText => {
        if (!searchText) return null;
        const header = extractHeader(searchText) || searchText;
        for (const b of blocks) {
          if (b.text.startsWith(header)) return b;
        }
        return null;
      };

      // 各 diagnostic にブロックを紐付け
      const withBlock = diagnostics.map(d => {
        const loc = d.location_data || {};
        let block = null;
        if (loc.block_index != null) block = blockMap.get(loc.block_index) || null;
        if (!block && loc.search_text) block = findBlockBySearchText(loc.search_text);
        return { d, block };
      });

      // block_index でグループ化（null は最後に）
      const groups = new Map(); // key: block_index or '__unknown__'
      for (const { d, block } of withBlock) {
        const key = block != null ? block.index : '__unknown__';
        if (!groups.has(key)) groups.set(key, { block, items: [] });
        groups.get(key).items.push(d);
      }

      // ブロック順にソート（unknown は末尾）
      const sorted = [...groups.entries()].sort(([ka], [kb]) => {
        if (ka === '__unknown__') return 1;
        if (kb === '__unknown__') return -1;
        return Number(ka) - Number(kb);
      });

      // 【...】ヘッダーがないブロックは除外（書類名など）
      const rows = sorted.filter(([, { block }]) => {
        if (!block) return true; // unknown はまとめて表示
        return !!extractHeader(block.text);
      });

      if (!rows.length) return '';

      const rowsHtml = rows.map(([key, { block, items }]) => {
        // ブロックが見つからない場合でも search_text に【...】があれば見出しに使う
        let header;
        if (block) {
          header = extractHeader(block.text) || '（位置不明）';
        } else if (items[0]?.location_data?.search_text) {
          header = items[0].location_data.search_text;
        } else {
          header = '（位置不明）';
        }

        // severity 順にソート
        const sortedItems = [...items].sort((a, b) =>
          (SEVERITY_ORDER[a.severity] ?? 9) - (SEVERITY_ORDER[b.severity] ?? 9)
        );

        const issuesHtml = sortedItems.map(d => {
          const hasDetail = d.reason || d.suggestion || d.original_text;
          const detailHtml = hasDetail ? `
            <div class="issue-detail">
              ${d.original_text ? `<div class="issue-detail-row"><span class="issue-detail-key">原文</span>${escapeHtml(d.original_text)}</div>` : ''}
              ${d.reason ? `<div class="issue-detail-row"><span class="issue-detail-key">根拠</span>${escapeHtml(d.reason)}</div>` : ''}
              ${d.suggestion ? `<div class="issue-detail-row"><span class="issue-detail-key">修正案</span>${escapeHtml(d.suggestion)}</div>` : ''}
            </div>` : '';
          return `
            <div class="issue-item" data-severity="${escapeHtml(d.severity)}">
              <span class="issue-dot ${escapeHtml(d.severity)}">${SEVERITY_DOT[d.severity] || '・'}</span>
              <div class="issue-body">
                <div class="issue-label">${isAiRule(d.rule_id) ? '<span class="ai-badge">AI</span>' : ''}${escapeHtml(d.rule_label)}</div>
                <div class="issue-summary"${hasDetail ? ' onclick="toggleIssueDetail(this)"' : ''}>
                  <span class="issue-message">${escapeHtml(d.message)}</span>
                  ${hasDetail ? '<span class="issue-toggle">▶ 詳細</span>' : ''}
                </div>
                ${detailHtml}
              </div>
            </div>`;
        }).join('');

        return `
          <tr>
            <td class="location-cell">${escapeHtml(header)}</td>
            <td class="issues-cell">${issuesHtml}</td>
          </tr>
        `;
      }).join('');

      // 重要度ごとの件数を集計
      const sevCount = { error: 0, warning: 0, info: 0 };
      for (const [, { items }] of rows) {
        for (const d of items) sevCount[d.severity] = (sevCount[d.severity] || 0) + 1;

        <div class="severity-filter" data-table="${tableId}">
          <span>表示：</span>
          ${sevCount.error > 0 ? `<button class="sev-btn active-error" data-sev="error" onclick="toggleSevFilter(this)">● Error ${sevCount.error}</button>` : ''}
          ${sevCount.warning > 0 ? `<button class="sev-btn active-warning" data-sev="warning" onclick="toggleSevFilter(this)">▲ Warning ${sevCount.warning}</button>` : ''}
          ${sevCount.info > 0 ? `<button class="sev-btn active-info" data-sev="info" onclick="toggleSevFilter(this)">◆ Info ${sevCount.info}</button>` : ''}
        </div>`;

      return section(title, `
        ${filterBar}
        <table class="grouped-table" id="${tableId}">
          <thead>
            <tr><th>指摘箇所</th><th>指摘事項</th></tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      `);
    };

    const isAiRule = ruleId => String(ruleId).startsWith('AI_');


    // アコーディオン開閉
    function toggleIssueDetail(summaryEl) {
      const detail = summaryEl.parentElement.querySelector('.issue-detail');
      const toggle = summaryEl.querySelector('.issue-toggle');

    // 重要度フィルター
    function toggleSevFilter(btn) {
      const sev = btn.dataset.sev;
      const activeClass = `active-${sev}`;
      const isActive = btn.classList.toggle(activeClass);

    const renderDiagnostics = diagnostics => {
      if (!diagnostics.length) return section('診断結果', '<div class="empty">No diagnostics.</div>');
      return section('診断結果', `

                  <div class="diagnostic-meta">${escapeHtml(diagnostic.rule_id)} / ${escapeHtml(diagnostic.location)}</div>
                </td>

            `).join('')}
          </tbody>
        </table>
      `);
    };

    const renderTermOccurrences = occurrences => {
      const rows = Object.entries(occurrences).sort(([a], [b]) => a.localeCompare(b, 'ja'));
      if (!rows.length) return section('語句出現表', '<div class="empty">No term occurrences.</div>');
      return section('語句出現表', `
        <table>
          <thead><tr><th>語句</th><th>出現場所</th></tr></thead>
          <tbody>

    const formatClaimNumbers = numbers => {
      if (!numbers || !numbers.length) return '－';
      return numbers.map(number => `請求項${number}`).join('、');
    };

    const renderClaimRelationships = claims => {
      const incoming = new Map(claims.map(claim => [Number(claim.number), []]));
      claims.forEach(claim => {
        (claim.referenced_claims || []).forEach(number => {
          const key = Number(number);
          if (!incoming.has(key)) incoming.set(key, []);
          incoming.get(key).push(Number(claim.number));
        });
      });
      const rows = [...claims].sort((a, b) => Number(a.number) - Number(b.number));
      if (!rows.length) return section('請求項の関係', '<div class="empty">No claims.</div>');
      return section('請求項の関係', `
        <table>
          <thead><tr><th>請求項</th><th>従属先</th><th>被従属</th><th>種別</th><th>状態</th></tr></thead>
          <tbody>
            ${rows.map(claim => {
              const references = (claim.referenced_claims || []).map(Number);
              const relation = !references.length ? '独立項' : new Set(references).size > 1 ? '複数従属項' : '従属項';
              const states = [];
              if (claim.is_multi_multi) states.push('マルチマルチ');
              if (claim.references_multi_multi) states.push('マルチマルチを引用');
              if (claim.references_multiple_dependent) states.push('複数従属項を引用');
              const incomingClaims = [...new Set(incoming.get(Number(claim.number)) || [])].sort((a, b) => a - b);
              return `
                <tr>
                  <td>請求項${escapeHtml(claim.number)}</td>
                  <td>${escapeHtml(formatClaimNumbers(references))}</td>
                  <td>${escapeHtml(formatClaimNumbers(incomingClaims))}</td>
                  <td>${escapeHtml(relation)}</td>
                  <td>${escapeHtml(states.length ? states.join('、') : '－')}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `);
    };

    const renderUnitChecks = unitChecks => {
      if (!unitChecks.length) return section('単位チェック', '<div class="empty">No unit expressions.</div>');
      return section('単位チェック', `
        <table>
          <thead><tr><th>行</th><th>桁</th><th>マッチ</th><th>数値</th><th>単位</th><th>Level</th><th>Message</th></tr></thead>
          <tbody>
            ${unitChecks.map(item => `
              <tr>
                <td>${escapeHtml(item.line)}</td>

                <td>${escapeHtml(item.message)}</td>

          </tbody>
        </table>
      `);
    };

    const renderReferenceSigns = entries => section('符号の説明用一覧', `
      <div class="reference-controls">
        <label>連結記号
          <select id="reference-joiner">
            <option value="…" selected>三点リーダ</option>
            <option value="　">空白</option>
          </select>
        </label>
        <label>区切り文字
          <select id="reference-separator">
            <option value="、">読点（、）</option>
            <option value="，" selected>カンマ（，）</option>
            <option value="__newline__">改行</option>
          </select>
        </label>
        <label>符号
          <select id="reference-width">
            <option value="full" selected>全角</option>
            <option value="half">半角</option>
          </select>
        </label>
        <label class="check"><input type="checkbox" id="reference-sort" checked> 昇順にソート</label>
      </div>
      <div class="reference-output" id="reference-output"></div>
      <h2>抽出元</h2>
      ${entries.length ? `
        <table>
          <thead><tr><th>符号</th><th>語句</th><th>出現場所</th></tr></thead>
          <tbody>
            ${entries.map(entry => `
              <tr>
                <td>${escapeHtml(entry.sign)}</td>
                <td>${escapeHtml(entry.term)}</td>
                <td>${escapeHtml(entry.source)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      ` : '<div class="empty">No signed terms.</div>'}
    `);

    const normalizeSign = value => String(value)
      .replace(/[Ａ-Ｚａ-ｚ０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
      .replace(/[－ー―‐]/g, '-')
      .replace(/['＇]/g, "'")
      .replace(/[　\s]+/g, '')
      .toUpperCase();
    const toFullWidth = value => String(value)
      .replace(/[A-Za-z0-9]/g, char => String.fromCharCode(char.charCodeAt(0) + 0xFEE0))
      .replace(/-/g, '－')
      .replace(/'/g, '‘');
    const toHalfWidth = value => normalizeSign(value).replace(/'/g, "'");
    const signRank = sign => {
      const normalized = normalizeSign(sign);
      const match = normalized.match(/^([A-Z]+)?(?:-)?(\d+)?(.*)$/);
      if (!match) return [3, normalized];
      const letters = match[1] || '';
      const number = match[2] ? Number(match[2]) : null;
      const rest = match[3] || '';
      if (letters && number === null) return [0, letters, rest];
      if (letters && number !== null) return [0, letters, 0, number, rest];
      if (number !== null) return [1, number, /^[A-ZＡ-Ｚａ-ｚぁ-んァ-ヶ]/.test(rest) ? 1 : rest.startsWith('-') ? 2 : 3, rest];
      return [2, normalized];
    };
    const compareRank = (left, right) => {
      const max = Math.max(left.length, right.length);
      for (let i = 0; i < max; i += 1) {
        if (left[i] === right[i]) continue;
        if (left[i] === undefined) return -1;
        if (right[i] === undefined) return 1;
        if (typeof left[i] === 'number' && typeof right[i] === 'number') return left[i] - right[i];
        return String(left[i]).localeCompare(String(right[i]), 'ja', { numeric: true });
      }
      return 0;
    };

    const attachReferenceControls = entries => {
      const output = $('#reference-output');
      if (!output) return;
      const renderReferenceOutput = () => {
        const joiner = $('#reference-joiner').value;
        const separator = $('#reference-separator').value === '__newline__' ? '\n' : $('#reference-separator').value;
        const width = $('#reference-width').value;
        const items = entries.map((entry, index) => ({ ...entry, index }));
        if ($('#reference-sort').checked) {
          items.sort((a, b) => compareRank(signRank(a.sign), signRank(b.sign)) || a.index - b.index);
        }
        output.textContent = items.map(entry => {
          const sign = width === 'full' ? toFullWidth(entry.sign) : toHalfWidth(entry.sign);
          return `${sign}${joiner}${entry.term}`;
        }).join(separator);
      };
      document.querySelectorAll('#reference-joiner, #reference-separator, #reference-width, #reference-sort')
        .forEach(element => element.addEventListener('change', renderReferenceOutput));
      renderReferenceOutput();
    };

    // -----------------------------------------------------------------------
    // Upload (rule-based check, stores document_id)
    // -----------------------------------------------------------------------

    const uploadDocument = async (url, options) => {
      setBusy(true);
      status.textContent = '解析中...';
      aiPanel.classList.add('hidden');
      tokenLog.innerHTML = '';
      state.documentId = null;
      state.proofreadResults = [];
      state.proofreadDone = false;
      // 結果エリアをリセット
      result.className = 'empty';
      result.classList.remove('hidden');
      result.textContent = '解析中...';
      $('#result-tabs').classList.add('hidden');
      ['panel-diagnostics','panel-claims','panel-reference','panel-terms','panel-ai'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.innerHTML = ''; el.classList.remove('active'); }
      });
      document.getElementById('panel-diagnostics')?.classList.add('active');
      const badge = $('#ai-tab')?.querySelector('.result-tab-badge');
      if (badge) badge.remove();
      const aiPill = summary.querySelector('.pill.ai');
      if (aiPill) aiPill.remove();
      try {
        const response = await fetch(url, options);
        const text = await response.text();
        let data = {};
        if (text) data = JSON.parse(text);
        if (!response.ok) throw new Error(data.detail || response.statusText);
        render(data);
        if (data.document_id) {
          state.documentId = data.document_id;
          aiPanel.classList.remove('hidden');
          updateAiSubmitState();
        }
        status.textContent = '解析が完了しました。';
      } catch (error) {
        showError(error.message || String(error));
      } finally {
        setBusy(false);
      }
    };

    $('#text-form').addEventListener('submit', event => {
      event.preventDefault();
      const text = $('#text-input').value;
      if (!text.trim()) { showError('テキストを入力してください。'); return; }
      uploadDocument('/api/documents/upload-text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, source: 'ui-text' })
      });
    });

    $('#docx-form').addEventListener('submit', event => {
      event.preventDefault();
      const file = $('#docx-input').files[0];
      if (!file) { showError('docx ファイルを選択してください。'); return; }
      const form = new FormData();
      form.append('file', file);
      uploadDocument('/api/documents/upload-docx', { method: 'POST', body: form });
    });

    // -----------------------------------------------------------------------
    // Character-level diff (LCS)
    // -----------------------------------------------------------------------

    const diffChars = (a, b) => {
      const m = a.length, n = b.length;
      // サイズが大きすぎる場合は差分なしで返す
      if (m * n > 400000) return [{ text: a, type: 'del' }, { text: b, type: 'ins' }];

      // LCS DP
      const dp = Array.from({ length: m + 1 }, () => new Uint16Array(n + 1));
      for (let i = m - 1; i >= 0; i--)
        for (let j = n - 1; j >= 0; j--)
          dp[i][j] = a[i] === b[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);

      // トレースバック
      const ops = [];
      let i = 0, j = 0;
      while (i < m || j < n) {
        if (i < m && j < n && a[i] === b[j]) {
          ops.push({ ch: a[i], type: 'eq' }); i++; j++;
        } else if (j < n && (i >= m || dp[i][j + 1] >= dp[i + 1][j])) {
          ops.push({ ch: b[j], type: 'ins' }); j++;
        } else {
          ops.push({ ch: a[i], type: 'del' }); i++;
        }
      }

      // 連続する同じ type をまとめる
      const runs = [];
      for (const op of ops) {
        if (runs.length && runs[runs.length - 1].type === op.type)
          runs[runs.length - 1].text += op.ch;
        else
          runs.push({ text: op.ch, type: op.type });
      }
      return runs;
    };

    const renderDiffHtml = (original, corrected) => {
      const runs = diffChars(original, corrected);
      let beforeHtml = '', afterHtml = '';
      for (const run of runs) {
        const escaped = escapeHtml(run.text);
        if (run.type === 'eq') {
          beforeHtml += escaped;
          afterHtml += escaped;
        } else if (run.type === 'del') {
          beforeHtml += `<span class="diff-del">${escaped}</span>`;
        } else {
          afterHtml += `<span class="diff-ins">${escaped}</span>`;
        }
      }
      return { beforeHtml, afterHtml };
    };

    // -----------------------------------------------------------------------
    // Incremental proofreading DOM helpers
    // -----------------------------------------------------------------------

    const PROOFREAD_SECTION_ID = 'proofread-section';
    const PROOFREAD_TBODY_ID = 'proofread-tbody';
    const PROOFREAD_TITLE_ID = 'proofread-title';

    const ensureProofreadSection = () => {
      if (document.getElementById(PROOFREAD_SECTION_ID)) return;

      const aiPanel = $('#panel-ai');
      const sectionEl = document.createElement('div');
      sectionEl.id = PROOFREAD_SECTION_ID;
      sectionEl.className = 'result-section';
      sectionEl.innerHTML = `
        <h2 id="${PROOFREAD_TITLE_ID}">AI文書校正結果（0件）</h2>
        <table style="table-layout:fixed;">
          <thead>
            <tr>
              <th style="width:70px;">箇所</th>
              <th>校正前</th>
              <th>校正後</th>
            </tr>
          </thead>
          <tbody id="${PROOFREAD_TBODY_ID}"></tbody>
        </table>
      `;
      aiPanel.innerHTML = '';
      aiPanel.appendChild(sectionEl);
      // AI校正タブに切り替え
      switchResultTab('panel-ai');
    };

    const appendProofreadRow = item => {
      const tbody = document.getElementById(PROOFREAD_TBODY_ID);
      if (!tbody) return;
      let beforeHtml = '', afterHtml = '';
      if (item.has_correction && item.corrected_text) {
        ({ beforeHtml, afterHtml } = renderDiffHtml(item.original_text, item.corrected_text));
      }
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="width:70px;font-weight:600;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;vertical-align:top;">${escapeHtml(item.label)}</td>
        <td style="vertical-align:top;"><div class="proofread-before">${beforeHtml}</div></td>
        <td style="vertical-align:top;"><div class="proofread-after">${afterHtml}</div></td>
      `;
      tbody.appendChild(tr);
    };

    const updateProofreadSummary = () => {
      const titleEl = document.getElementById(PROOFREAD_TITLE_ID);
      if (!titleEl) return;
      const count = state.proofreadResults.filter(r => r._displayed).length;
      titleEl.textContent = `AI文書校正結果（${count}件）`;
      // サマリーピルも更新
      const pill = summary.querySelector('.pill.ai');
      if (pill) {
        pill.textContent = `AI校正 ${count}件`;
      } else if (count > 0) {
        const newPill = document.createElement('span');
        newPill.className = 'pill ai';
        newPill.textContent = `AI校正 ${count}件`;
        summary.appendChild(newPill);
      }
      // タブのバッジを更新
      const aiTabBtn = $('#ai-tab');
      if (aiTabBtn) {
        let badge = aiTabBtn.querySelector('.result-tab-badge');
        if (count > 0) {
          if (!badge) { badge = document.createElement('span'); badge.className = 'result-tab-badge'; aiTabBtn.appendChild(badge); }
          badge.textContent = count;
        } else if (badge) {
          badge.remove();
        }
      }
    };

    // -----------------------------------------------------------------------
    // AI panel controls
    // -----------------------------------------------------------------------

    const updateAiPanelVisibility = () => {
      const provider = $('#ai-provider').value;
      $('#ollama-model-row').classList.toggle('hidden', provider !== 'ollama');
      updateAiSubmitState();
    };

    const updateAiSubmitState = () => {
      $('#ai-submit').disabled = state.proofreadDone;
      $('#ai-clear').classList.toggle('hidden', !state.proofreadDone);
      if (state.proofreadDone) {
        aiStatus.textContent = '校正済みです。クリアして再実行できます。';
      } else if (!aiStatus.textContent.includes('実行中') && !aiStatus.textContent.includes('エラー')) {
        aiStatus.textContent = '';
      }
    };

    $('#ai-clear').addEventListener('click', () => {
      state.proofreadResults = [];
      state.proofreadDone = false;
      const sec = document.getElementById(PROOFREAD_SECTION_ID);
      if (sec) sec.remove();
      $('#panel-ai').innerHTML = '';
      const pill = summary.querySelector('.pill.ai');
      if (pill) pill.remove();
      const badge = $('#ai-tab')?.querySelector('.result-tab-badge');
      if (badge) badge.remove();
      aiStatus.textContent = '';
      tokenLog.innerHTML = '';
      updateAiSubmitState();
    });

    $('#ai-provider').addEventListener('change', updateAiPanelVisibility);

    // -----------------------------------------------------------------------
    // SSE utility
    // -----------------------------------------------------------------------

    const consumeSse = async (response, onEvent, signal) => {
      const reader = response.body.getReader();
      if (signal) signal.addEventListener('abort', () => reader.cancel());
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const chunks = buffer.split('\n\n');
        buffer = chunks.pop();
        for (const chunk of chunks) {
          if (!chunk.trim()) continue;
          let eventName = 'message';
          let dataStr = '';
          for (const line of chunk.split('\n')) {
            if (line.startsWith('event:')) eventName = line.slice(6).trim();
            else if (line.startsWith('data:')) dataStr = line.slice(5).trim();
          }
          if (dataStr) {
            try { onEvent(eventName, JSON.parse(dataStr)); }
            catch { /* ignore */ }
          }
        }
      }
    };

    // -----------------------------------------------------------------------
    // AI proofreading execution
    // -----------------------------------------------------------------------

    $('#ai-submit').addEventListener('click', async () => {
      if (!state.documentId) { showAiError('先にドキュメントをアップロードしてください。'); return; }

      const provider = $('#ai-provider').value;
      const anonymize = $('#ai-anonymize').checked;
      const model = provider === 'ollama' ? ($('#ai-ollama-model').value.trim() || null) : null;
      const endpoint = `/api/documents/${state.documentId}/proofread`;
      const body = { provider, model, anonymize };

      _aiAbortController = new AbortController();
      const signal = _aiAbortController.signal;

      setAiBusy(true);
      aiStatus.textContent = 'AI文書校正実行中...';
      state.proofreadResults = [];
      tokenLog.innerHTML = '';

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          signal,
        });
        if (!response.ok) {
          const text = await response.text();
          let detail = response.statusText;
          try { detail = JSON.parse(text).detail || detail; } catch { /* ignore */ }
          throw new Error(detail);
        }

        let totalBlocks = 0;
        let processed = 0;

        // 校正結果テーブルを事前に挿入しておき、行を追記していく
        ensureProofreadSection();

        await consumeSse(response, (eventName, data) => {
          if (eventName === 'start') {
            totalBlocks = data.total || 0;
          } else if (eventName === 'result') {
            processed++;
            const item = {
              label: data.label,
              has_correction: data.has_correction,
              original_text: data.original_text,
              corrected_text: data.corrected_text || null,
            };
            state.proofreadResults.push(item);

            const isRealCorrection = item.has_correction && item.corrected_text && item.corrected_text !== item.original_text;
            if (isRealCorrection) {
              item._displayed = true;
              appendProofreadRow(item);
            }
            updateProofreadSummary();

            const prog = totalBlocks > 0 ? ` (${processed}/${totalBlocks})` : '';
            const correctedSoFar = state.proofreadResults.filter(r => r._displayed).length;
            aiStatus.textContent = `校正中${prog}… 修正あり ${correctedSoFar} 件`;

            const u = data.token_usage;
            if (u) {
              const now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
              const entry = document.createElement('div');
              entry.className = 'token-entry';
              entry.innerHTML = `<div class="token-label">${escapeHtml(now)} ${escapeHtml(data.label)}</div>`
                + `入力 ${u.input_tokens.toLocaleString()} / 出力 ${u.output_tokens.toLocaleString()} / 合計 ${u.total_tokens.toLocaleString()} トークン`;
              tokenLog.appendChild(entry);
            }
          } else if (eventName === 'done') {
            const correctionCount = state.proofreadResults.filter(r => r._displayed).length;
            state.proofreadDone = true;
            updateAiSubmitState();
            aiStatus.textContent = `AI文書校正完了（修正あり ${correctionCount} 件）`;

            const u = data.total_token_usage;
            if (u) {
              const now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
              const entry = document.createElement('div');
              entry.className = 'token-entry';
              entry.style.fontWeight = '600';
              entry.innerHTML = `<div class="token-label">${escapeHtml(now)} 合計</div>`
                + `入力 ${u.input_tokens.toLocaleString()} / 出力 ${u.output_tokens.toLocaleString()} / 合計 ${u.total_tokens.toLocaleString()} トークン`;
              tokenLog.appendChild(entry);
            }
          } else if (eventName === 'error') {
            showAiError(data.message || 'AI校正エラー');
          }
        }, signal);
      } catch (error) {
        if (error.name === 'AbortError') {
          aiStatus.textContent = 'キャンセルしました。';
        } else {
          showAiError(error.message || String(error));
        }
      } finally {
        _aiAbortController = null;
        setAiBusy(false);
        updateAiSubmitState();
      }
    });

    // -----------------------------------------------------------------------
    // Tab switching
    // -----------------------------------------------------------------------
    $('#text-tab').addEventListener('click', () => setMode('text'));
    $('#docx-tab').addEventListener('click', () => setMode('docx'));
    $('#clear-text').addEventListener('click', () => { $('#text-input').value = ''; });

    // -----------------------------------------------------------------------
    // Health check
    // -----------------------------------------------------------------------
    fetch('/health')
      .then(response => response.json())
      .then(data => { $('#health').textContent = data.status === 'ok' ? 'API ready' : 'API'; })
      .catch(() => { $('#health').textContent = 'API unavailable'; });
  </script>
</body>
</html>
