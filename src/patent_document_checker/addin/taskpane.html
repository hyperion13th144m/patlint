<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PatLint Word Add-in</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="/addin/taskpane.css">
</head>
<body>
  <header>
    <h1>PatLint</h1>
    <a href="/help" target="_blank" rel="noopener">ヘルプ</a>
  </header>

  <main>
    <label for="api-url">API URL</label>
    <input id="api-url" type="url">
    <div class="actions">
      <button type="button" id="check-document">文書をチェック</button>
      <button type="button" id="check-api" class="secondary">接続確認</button>
    </div>
    <div id="status" class="status">Word 文書を開いてください。</div>
    <div id="summary" class="summary"></div>
    <div id="results" class="empty">診断結果がここに表示されます。</div>
  </main>

  <script src="/addin/taskpane.js"></script>
</body>
</html>
