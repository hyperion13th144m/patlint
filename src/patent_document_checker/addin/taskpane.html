<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PatLint Word Add-in</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="/addin/taskpane.css">
</head>
<body>
  <header>
    <h1>PatLint</h1>
    <nav>
      <a href="/help" target="_blank" rel="noopener">ヘルプ</a>
      <span class="muted" id="health">API</span>
    </nav>
  </header>

  <main>
    <label for="api-url">API URL</label>
    <input id="api-url" type="url">

    <div class="actions">
      <button type="button" id="check-document">文書をチェック</button>
      <button type="button" id="check-api" class="secondary">接続確認</button>
    </div>
    <div id="status" class="status">Word 文書を開いてください。</div>

    <div class="summary" id="summary"></div>

    <!-- AI proofreading panel: shown after successful check -->
    <div id="ai-panel" class="ai-panel hidden">
      <hr class="divider">
      <p class="ai-panel-title">AI文書校正</p>

      <label for="ai-provider">プロバイダー</label>
      <select id="ai-provider">
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="ollama">Ollama（ローカル）</option>
      </select>

      <div id="ollama-model-row" class="hidden">
        <label for="ai-ollama-model">Ollama モデル名</label>
        <input type="text" id="ai-ollama-model" placeholder="例: qwen3:8b" value="qwen3:8b">
      </div>

      <div class="check-row">
        <input type="checkbox" id="ai-anonymize" checked>
        <label for="ai-anonymize" style="margin:0;font-weight:normal;">匿名化して送信</label>
      </div>

      <div class="actions">
        <button type="button" id="ai-submit">文書校正を実行</button>
        <button type="button" id="ai-cancel" class="secondary hidden">キャンセル</button>
        <button type="button" id="ai-clear" class="secondary hidden">クリア</button>
      </div>
      <div class="ai-status muted" id="ai-status"></div>
      <div id="token-log"></div>
    </div>

    <div id="result-tabs" class="result-tabs hidden">
      <button class="result-tab active" data-panel="panel-diagnostics">診断結果</button>
      <button class="result-tab" data-panel="panel-claims">請求項</button>
      <button class="result-tab" data-panel="panel-reference">符号</button>
      <button class="result-tab" data-panel="panel-terms">語句・単位</button>
      <button class="result-tab" id="ai-tab" data-panel="panel-ai">AI校正</button>
    </div>

    <div id="panel-diagnostics" class="tab-panel active"></div>
    <div id="panel-claims" class="tab-panel"></div>
    <div id="panel-reference" class="tab-panel"></div>
    <div id="panel-terms" class="tab-panel"></div>
    <div id="panel-ai" class="tab-panel"></div>

    <div id="results" class="empty">診断結果がここに表示されます。</div>
  </main>

  <script src="/addin/taskpane.js"></script>
</body>
</html>
