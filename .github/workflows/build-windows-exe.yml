name: Build Windows API exe

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build exe
        shell: pwsh
        run: scripts/build-windows-exe.ps1

      - name: Smoke test executable
        shell: pwsh
        run: |
          $stdout = "api-smoke.stdout.log"
          $stderr = "api-smoke.stderr.log"
          $process = Start-Process -FilePath "dist/patlint-api.exe" -ArgumentList "--no-open", "--port", "18080" -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru
          try {
            $response = $null
            for ($i = 0; $i -lt 30; $i++) {
              if ($process.HasExited) {
                break
              }
              try {
                $response = Invoke-RestMethod -Uri "http://127.0.0.1:18080/health"
                break
              }
              catch {
                Start-Sleep -Seconds 1
              }
            }
            if ($null -eq $response -or $response.status -ne "ok") {
              Write-Host "Process exited: $($process.HasExited)"
              if ($process.HasExited) {
                Write-Host "Exit code: $($process.ExitCode)"
              }
              if (Test-Path $stdout) {
                Write-Host "--- stdout ---"
                Get-Content $stdout
              }
              if (Test-Path $stderr) {
                Write-Host "--- stderr ---"
                Get-Content $stderr
              }
              throw "Health check failed"
            }
          }
          finally {
            if (!$process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Prepare artifact bundle
        shell: pwsh
        run: |
          $bundle = "dist/patlint-api-windows"
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null
          New-Item -ItemType Directory -Force -Path "$bundle/words" | Out-Null
          Copy-Item "dist/patlint-api.exe" "$bundle/patlint-api.exe"
          Copy-Item "words/custom-sample.json" "$bundle/words/custom-sample.json"
          Copy-Item "words/custom-terms-sample.txt" "$bundle/words/custom-terms-sample.txt"
          Copy-Item "office-addin/manifest.xml" "$bundle/manifest.xml"

      - name: Upload executable bundle
        uses: actions/upload-artifact@v4
        with:
          name: patlint-api-windows
          path: dist/patlint-api-windows
          if-no-files-found: error
