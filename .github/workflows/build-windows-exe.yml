name: Build Windows API exe

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build exe
        shell: pwsh
        run: scripts/build-windows-exe.ps1

      - name: Smoke test executable
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "dist/patent-checker-api.exe" -ArgumentList "--no-open", "--port", "18080" -PassThru
          try {
            $response = $null
            for ($i = 0; $i -lt 30; $i++) {
              try {
                $response = Invoke-RestMethod -Uri "http://127.0.0.1:18080/health"
                break
              }
              catch {
                Start-Sleep -Seconds 1
              }
            }
            if ($null -eq $response -or $response.status -ne "ok") {
              throw "Health check failed"
            }
          }
          finally {
            if (!$process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: patent-checker-api-windows
          path: dist/patent-checker-api.exe
          if-no-files-found: error
